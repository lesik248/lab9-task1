name: Build all platforms

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

env:
  OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run common tests
        run: ./gradlew :composeApp:testDebugUnitTest -POPENWEATHER_API_KEY=$OPENWEATHER_API_KEY --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :composeApp:assembleDebug -POPENWEATHER_API_KEY=$OPENWEATHER_API_KEY --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: weather-android-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk

  desktop:
    name: Desktop (Linux JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run desktop tests (unit + UI + integration)
        run: ./gradlew :composeApp:desktopTest -POPENWEATHER_API_KEY=$OPENWEATHER_API_KEY --stacktrace

      - name: Package distribution
        run: ./gradlew :composeApp:packageDistributionForCurrentOS -POPENWEATHER_API_KEY=$OPENWEATHER_API_KEY --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: weather-desktop-linux
          path: |
            composeApp/build/compose/binaries/main/deb/*.deb
            composeApp/build/compose/jars/*.jar

  web:
    name: Web (Wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Wasm distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution -POPENWEATHER_API_KEY=$OPENWEATHER_API_KEY --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: weather-web
          path: composeApp/build/dist/wasmJs/productionExecutable/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: composeApp/build/dist/wasmJs/productionExecutable/

  deploy-pages:
    name: Deploy Web to GitHub Pages
    needs: web
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  ios:
    name: iOS App (Simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Link iOS Simulator (arm64) framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 -POPENWEATHER_API_KEY=$OPENWEATHER_API_KEY --stacktrace

      - name: Build iOS app for simulator
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath iosApp/build \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            EXCLUDED_ARCHS=x86_64 \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Stage .app at workspace root
        run: |
          APP_DIR="iosApp/build/Build/Products/Debug-iphonesimulator/iosApp.app"
          if [ ! -d "$APP_DIR" ]; then
            echo "App bundle not found at $APP_DIR"; exit 1
          fi
          cp -R "$APP_DIR" ./iosApp.app

      - uses: actions/upload-artifact@v4
        with:
          name: weather-ios-app
          path: iosApp.app
